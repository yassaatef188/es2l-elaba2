<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,Helvetica,sans-serif;
    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    overflow:hidden;
}

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:url("images/logo.jpeg") center center no-repeat;

    background-size:contain;

    transition:.8s;

    z-index:-1;

}

body.blur::before{

    filter:blur(12px) brightness(40%);

}

.hidden{

    display:none!important;

}

/* ---------------- PHONE ---------------- */

.phone{

    width:350px;

    background:#000;

    padding:30px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 0 20px rgba(255,255,255,.2);

}

.logo{

    width:120px;

    height:120px;

    border-radius:50%;

    border:3px solid #007bff;

    object-fit:cover;

    margin-bottom:20px;

}

.status{

    color:white;

    margin:20px 0;

    min-height:25px;

}

.start{

    padding:15px 40px;

    border:none;

    background:#007bff;

    color:white;

    border-radius:50px;

    cursor:pointer;

    font-size:18px;

}

.keypad{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:15px;

    margin-top:25px;

}

.key{

    width:70px;

    height:70px;

    border-radius:50%;

    background:#1d1d1d;

    color:white;

    font-size:25px;

    border:1px solid #444;

    cursor:pointer;

    margin:auto;

    transition:0.2s;

}

.key.active{

    background:#007bff;

    color:white;

    transform:scale(.92);

    border-color:#4da3ff;

}

/* ---------------- VIDEO ---------------- */

#videoScreen{

    width:90%;

    max-width:1000px;

    display:flex;

    flex-direction:column;

    align-items:center;

}

#answerVideo{

    width:100%;

    border-radius:15px;

    background:black;

}

#nextBtn{

    margin-top:20px;

    padding:15px 40px;

    border:none;

    border-radius:10px;

    background:#007bff;

    color:white;

    cursor:pointer;

    font-size:18px;

}

</style>

</head>

<body>

<div id="phoneScreen" class="phone">

<img
src="images/logo.jpeg"
class="logo">

<div
id="status"
class="status">

Press Start

</div>

<button
id="startBtn"
class="start">

Start

</button>

<div
id="keypad"
class="keypad hidden">

<button class="key" onclick="pressKey(1)">1</button>
<button class="key" onclick="pressKey(2)">2</button>
<button class="key" onclick="pressKey(3)">3</button>

<button class="key" onclick="pressKey(4)">4</button>
<button class="key" onclick="pressKey(5)">5</button>
<button class="key" onclick="pressKey(6)">6</button>

<button class="key" onclick="pressKey(7)">7</button>
<button class="key" onclick="pressKey(8)">8</button>
<button class="key" onclick="pressKey(9)">9</button>

<button class="key" onclick="pressKey('*')">*</button>
<button class="key" onclick="pressKey(0)">0</button>
<button class="key" onclick="pressKey('#')">#</button>

<div></div>

</div>

</div>

<!-- ================= VIDEO ================= -->

<div
id="videoScreen"
class="hidden">

id="answerVideo"

</video>

/* =========================
      AUDIO FUNCTIONS
========================= */

function stopCurrentAudio(){

    if(currentAudio){

        currentAudio.pause();
        currentAudio.currentTime=0;

    }

}

function playAudio(file){

    stopCurrentAudio();

    currentAudio = new Audio(file);

    currentAudio.play().catch(err=>console.log(err));

    return currentAudio;

}

/* =========================
      START CALL
========================= */

startBtn.addEventListener("click",startCall);

function startCall(){

    startBtn.classList.add("hidden");

    let seconds = 3;

    status.innerText = "Connecting in "+seconds+"...";

    const timer = setInterval(()=>{

        seconds--;

        if(seconds>0){

            status.innerText="Connecting in "+seconds+"...";

        }

        else{

            clearInterval(timer);

            document.body.classList.add("blur");

            keypad.classList.remove("hidden");

            playMenu("welcome");

        }

    },1000);

}

/* =========================
      PLAY MENU
========================= */

function playMenu(menuName){

    const menu = IVR[menuName];
    // If the menu doesn't exist, replay the current menu
    if(!menu){

        console.warn("Menu not found:", menuName);

        if(menuName !== currentMenu){
            playMenu(currentMenu);
        }

        return;
    }

    currentMenu = menuName;

    // Video node
    if(menu.video){

        showVideo(menu.video, menu.next);
        return;

    }

if(menu.audio){

    status.innerText = "Playing...";

    const audio = playAudio(menu.audio);

    audio.onended = () => {

        if(menu.next){

            playMenu(menu.next);
            return;
        }

        status.innerText = "Choose an option";

    };

}
else{

    status.innerText = menu.message || "Choose an option";

}

}

/* =========================
      VIDEO SCREEN
========================= */

let returnMenu = "main";

function showVideo(videoFile,nextMenu){

    returnMenu = nextMenu;

    stopCurrentAudio();

    phoneScreen.classList.add("hidden");

    videoScreen.classList.remove("hidden");

    answerVideo.src = videoFile;

    answerVideo.load();

    answerVideo.play();

}

nextBtn.addEventListener("click",backToPhone);

function backToPhone(){

    answerVideo.pause();

    answerVideo.currentTime=0;

    videoScreen.classList.add("hidden");

    phoneScreen.classList.remove("hidden");

    playMenu(returnMenu);

}

/* =========================
      KEYPAD
========================= */

function pressKey(number){

const keys = document.querySelectorAll(".key");

keys.forEach(key => {

    if(key.innerText == number){

        key.classList.add("active");

        setTimeout(()=>{

            key.classList.remove("active");

        },200);

    }

});
    stopCurrentAudio();

    if(number == "#"){

        playMenu("main");

        return;
    }

    if(number == "*"){

        playMenu(currentMenu);

        return;
    }

    const menu = IVR[currentMenu];

    if(!menu){

        status.innerText="Unknown menu";
        return;

    }

    if(!menu.options){

        status.innerText="No options available";

        return;

    }

    const nextMenu = menu.options[number];

    if(!nextMenu){

        status.innerText="Invalid option";
        playMenu(currentMenu);

        setTimeout(()=>{

            status.innerText="Choose an option";

        },1000);

        return;

    }

    playMenu(nextMenu);

}


/* =========================
      KEYBOARD SUPPORT
========================= */

document.addEventListener("keydown",(event)=>{

    const key = event.key;

    if((key>="0" && key<="9") ||
        key=="*" ||
        key=="#"){

        pressKey(key);

    }

});


/* =========================
      OPTIONAL:
      REPLAY CURRENT MENU
      Press R
========================= */

document.addEventListener("keydown",(event)=>{

    if(event.key.toLowerCase()=="r"){

        playMenu(currentMenu);

    }

});


/* =========================
      OPTIONAL:
      ESC CLOSES VIDEO
========================= */

document.addEventListener("keydown",(event)=>{

    if(event.key==="Escape" || event.key==="Enter"){

        if(!videoScreen.classList.contains("hidden")){

            backToPhone();

        }

    }

});


/* =========================
      VIDEO ENDED
========================= */

answerVideo.addEventListener("ended",()=>{

    nextBtn.focus();

});
/* ======================
        End Call
=====================*/

function endCall() {

    stopCurrentAudio();

    currentMenu = "welcome";

    status.innerText = "Call Ended";

    keypad.classList.add("hidden");

    startBtn.classList.remove("hidden");

    document.body.classList.remove("blur");

    phoneScreen.classList.remove("hidden");

    videoScreen.classList.add("hidden");

    answerVideo.pause();
    answerVideo.currentTime = 0;

}

/* =========================
      READY
========================= */

status.innerText="Press Start";

</script>
